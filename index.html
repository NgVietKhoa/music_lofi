<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lofi Chill — Music & Vibes</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&family=Caveat:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ========== BACKGROUND ========== -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-stack active" id="bgStackA">
      <img class="bg-img bg-img--fill" id="bgAFill" alt="" aria-hidden="true" />
      <img class="bg-img bg-img--main" id="bgA" alt="" />
    </div>
    <div class="bg-stack" id="bgStackB">
      <img class="bg-img bg-img--fill" id="bgBFill" alt="" aria-hidden="true" />
      <img class="bg-img bg-img--main" id="bgB" alt="" />
    </div>
  </div>
  <div class="bg-overlay" aria-hidden="true"></div>

  <div class="rotate-hint" id="rotateHint" aria-live="polite">
    <div class="rotate-hint-icon" aria-hidden="true">↻</div>
    <p class="rotate-hint-title">Xoay ngang màn hình</p>
    <p class="rotate-hint-text">Lofi Chill được tối ưu cho chế độ ngang trên điện thoại.</p>
  </div>

  <!-- ========== DOCK (LifeAt / Lofi.co style) ========== -->
  <nav class="dock" id="dock" aria-label="Công cụ">
    <button type="button" class="dock-btn" data-modal="modalScene" title="Nền & Gallery">
      <i data-lucide="image"></i>
    </button>
    <button type="button" class="dock-btn" data-modal="modalClock" title="Đồng hồ">
      <i data-lucide="clock"></i>
    </button>
    <button type="button" class="dock-btn" data-modal="modalMusic" title="Nhạc">
      <i data-lucide="music"></i>
    </button>
    <button type="button" class="dock-btn" data-modal="modalPomo" title="Pomodoro">
      <i data-lucide="timer"></i>
    </button>
    <span class="dock-divider" aria-hidden="true"></span>
    <button type="button" class="dock-btn" id="themeToggle" title="Day / Night">
      <i data-lucide="sun"></i>
    </button>
  </nav>

  <!-- ========== MODAL BACKDROP ========== -->
  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true"></div>

  <!-- ========== SCENE / BACKGROUND ========== -->
  <section class="widget-modal glass" id="modalScene" role="dialog" aria-label="Nền" hidden>
    <header class="modal-header">
      <h2 class="panel-title"><i data-lucide="image"></i> Nền</h2>
      <button type="button" class="btn btn-icon modal-close" aria-label="Đóng"><i data-lucide="x"></i></button>
    </header>
    <div class="scene-controls">
      <div class="btn-row scene-nav">
        <button type="button" class="btn btn-icon" id="bgPrev" title="Ảnh trước"><i data-lucide="chevron-left"></i></button>
        <button type="button" class="btn btn-icon" id="bgShuffle" title="Ngẫu nhiên"><i data-lucide="shuffle"></i></button>
        <button type="button" class="btn btn-icon" id="bgNext" title="Ảnh sau"><i data-lucide="chevron-right"></i></button>
      </div>
      <p class="bg-label" id="bgLabel">bg 1 / 102</p>
      <button type="button" class="btn btn-with-icon btn-block" id="galleryOpen">
        <i data-lucide="images"></i><span>Chọn nền</span>
      </button>
    </div>
  </section>

  <!-- ========== CLOCK ========== -->
  <section class="widget-modal glass" id="modalClock" role="dialog" aria-label="Đồng hồ" hidden>
    <header class="modal-header">
      <h2 class="panel-title"><i data-lucide="clock"></i> Time</h2>
      <button type="button" class="btn btn-icon modal-close" aria-label="Đóng"><i data-lucide="x"></i></button>
    </header>
    <div class="clock-body">
      <div class="clock-analog" id="clockAnalog" aria-hidden="true">
        <div class="clock-face"></div>
        <div class="hand hour" id="handHour"></div>
        <div class="hand minute" id="handMinute"></div>
        <div class="hand second" id="handSecond"></div>
        <div class="center-dot"></div>
      </div>
      <div class="clock-digital-wrap">
        <div class="clock-digital" id="clockDigital">00:00:00</div>
        <div class="clock-date" id="clockDate"></div>
      </div>
    </div>
  </section>

  <!-- ========== MUSIC ========== -->
  <section class="widget-modal glass widget-modal--music" id="modalMusic" role="dialog" aria-label="Nhạc" hidden>
    <header class="modal-header">
      <h2 class="panel-title"><i data-lucide="music"></i> Music</h2>
      <button type="button" class="btn btn-icon modal-close" aria-label="Đóng"><i data-lucide="x"></i></button>
    </header>
    <div class="music-layout">
      <aside class="music-col music-col--search">
        <h3 class="music-section-label">Tìm kiếm</h3>
        <div class="yt-search-row">
          <input type="search" id="ytSearchInput" class="yt-search-input" placeholder="Tìm trên YouTube..." autocomplete="off" />
          <button type="button" class="btn btn-icon yt-search-btn" id="ytSearchBtn" title="Tìm"><i data-lucide="search"></i></button>
        </div>
        <div class="yt-search-results" id="ytSearchResults">
          <div class="yt-search-results-body"><p class="yt-search-idle">Nhập từ khóa để tìm</p></div>
        </div>
      </aside>

      <div class="music-col music-col--player music-player">
        <h3 class="music-section-label">Đang phát</h3>
        <div class="player-header">
          <div class="vinyl-wrap" id="vinylWrap">
            <div class="vinyl" id="vinyl">
              <img class="vinyl-art" id="vinylArt" alt="" />
              <span class="vinyl-ring" aria-hidden="true"></span>
              <span class="vinyl-spindle" aria-hidden="true"></span>
            </div>
          </div>
          <div class="track-info">
            <h3 id="trackTitle">Chưa có bài hát</h3>
            <p class="track-meta" id="trackMeta"></p>
            <div class="track-time"><span id="timeCurrent">0:00</span> / <span id="timeTotal">0:00</span></div>
          </div>
        </div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <div class="player-controls">
          <button type="button" class="btn btn-icon" id="musicShuffle" title="Shuffle"><i data-lucide="shuffle"></i></button>
          <button type="button" class="btn btn-icon" id="musicPrev" title="Previous"><i data-lucide="skip-back"></i></button>
          <button type="button" class="btn btn-icon btn-play" id="musicPlay" title="Play/Pause"><i data-lucide="play"></i></button>
          <button type="button" class="btn btn-icon" id="musicNext" title="Next"><i data-lucide="skip-forward"></i></button>
          <button type="button" class="btn btn-icon" id="musicRepeat" title="Repeat"><i data-lucide="repeat"></i></button>
        </div>
        <div class="volume-row">
          <button type="button" class="btn btn-icon" id="muteBtn" title="Mute"><i data-lucide="volume-2"></i></button>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" />
        </div>
      </div>

      <aside class="music-col music-col--playlist music-playlist-wrap">
        <h3 class="music-section-label">Playlist</h3>
        <div class="playlist" id="playlist"></div>
      </aside>
    </div>
    <div id="yt-player" class="music-media-hidden" aria-hidden="true"></div>
  </section>

  <script src="https://www.youtube.com/iframe_api"></script>

  <!-- ========== POMODORO ========== -->
  <section class="widget-modal glass widget-modal--compact widget-modal--pomo" id="modalPomo" role="dialog" aria-label="Pomodoro" hidden>
    <header class="modal-header">
      <h2 class="panel-title"><i data-lucide="timer"></i> Pomodoro</h2>
      <button type="button" class="btn btn-icon modal-close" aria-label="Đóng"><i data-lucide="x"></i></button>
    </header>
    <p class="pomo-settings-title">Thời gian làm việc</p>
    <div class="pomo-settings pomo-settings--dhms">
      <label class="pomo-setting">
        <span class="pomo-setting-label">Ngày</span>
        <input type="number" id="pomoDays" class="pomo-setting-input" min="0" max="99" value="0" inputmode="numeric" />
      </label>
      <label class="pomo-setting">
        <span class="pomo-setting-label">Giờ</span>
        <input type="number" id="pomoHours" class="pomo-setting-input" min="0" max="23" value="0" inputmode="numeric" />
      </label>
      <label class="pomo-setting">
        <span class="pomo-setting-label">Phút</span>
        <input type="number" id="pomoMinutes" class="pomo-setting-input" min="0" max="59" value="25" inputmode="numeric" />
      </label>
    </div>
    <div class="pomo-display" id="pomoDisplay">00:25:00</div>
    <div class="pomo-controls">
      <button type="button" class="btn" id="pomoStart">Start</button>
      <button type="button" class="btn" id="pomoPause">Pause</button>
      <button type="button" class="btn" id="pomoReset">Reset</button>
    </div>
  </section>

  <!-- ========== GALLERY — wallpaper picker ========== -->
  <div class="gallery-backdrop" id="galleryBackdrop"></div>
  <section class="gallery-panel" id="galleryPanel" role="dialog" aria-label="Chọn nền" hidden>
    <header class="gallery-top">
      <button type="button" class="gallery-icon-btn" id="galleryClose" aria-label="Đóng">
        <i data-lucide="x"></i>
      </button>
      <h2 class="gallery-top-title">Chọn nền</h2>
      <div class="gallery-jump">
        <label class="gallery-jump-label" for="gallerySearch">#</label>
        <input type="text" class="gallery-jump-input" id="gallerySearch" placeholder="Số" inputmode="numeric" autocomplete="off" />
        <button type="button" class="gallery-jump-go" id="galleryJumpBtn">Đi</button>
      </div>
    </header>

    <div class="gallery-stage" id="galleryStage">
      <button type="button" class="gallery-nav gallery-nav--prev" id="galleryPrev" aria-label="Ảnh trước">
        <i data-lucide="chevron-left"></i>
      </button>
      <div class="gallery-viewport" id="galleryViewport">
        <img class="gallery-fill" id="galleryPreviewFill" alt="" aria-hidden="true" />
        <img class="gallery-frame" id="galleryPreviewImg" alt="" />
      </div>
      <button type="button" class="gallery-nav gallery-nav--next" id="galleryNext" aria-label="Ảnh sau">
        <i data-lucide="chevron-right"></i>
      </button>
    </div>

    <div class="gallery-progress" aria-hidden="true">
      <div class="gallery-progress-fill" id="galleryProgressFill"></div>
    </div>

    <footer class="gallery-footer">
      <span class="gallery-counter" id="galleryPreviewMeta">1 / 102</span>
      <button type="button" class="gallery-btn gallery-btn--ghost" id="galleryRandom">
        <i data-lucide="shuffle"></i><span>Ngẫu nhiên</span>
      </button>
      <button type="button" class="gallery-btn gallery-btn--primary" id="galleryApply">
        <i data-lucide="check"></i><span>Chọn nền</span>
      </button>
    </footer>
  </section>

  <script src="node_modules/lucide/dist/umd/lucide.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
